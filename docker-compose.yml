# ============================================================
# Toàn bộ hệ thống — Phase 9
#   mysql    : DataMart (Star Schema) + bảng lịch sử
#   ollama   : LLM mã nguồn mở (Mistral / Llama 3 / Gemma)
#   backend  : FastAPI + 6 Agents + RAG
#   frontend : React (nginx) + reverse proxy /api -> backend
#
# Khởi chạy:
#   docker compose up -d --build
# Sau khi MySQL sẵn sàng, nạp dữ liệu mẫu + model + vector DB:
#   docker compose exec backend python /scripts/seed_data.py --reset
#   docker compose exec ollama ollama pull qwen2.5:1.5b
#   curl -X POST http://localhost:8000/rebuild-vector-db
# Frontend: http://localhost   |   API docs: http://localhost:8000/docs
# ============================================================
services:
  mysql:
    image: mysql:8.0
    container_name: datamart-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: datamart
      MYSQL_USER: datamart_user
      MYSQL_PASSWORD: changeme
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: datamart-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: datamart-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: datamart
      MYSQL_USER: datamart_user
      MYSQL_PASSWORD: changeme
      MYSQL_READONLY_USER: datamart_ro
      MYSQL_READONLY_PASSWORD: changeme
      # --- LLM CHUỖI FALLBACK: Groq -> OpenRouter -> Gemini -> Ollama local.
      #     Đặt các key (GROQ_API_KEY, OPENROUTER_API_KEY, GEMINI_API_KEY) trong file
      #     .env ở thư mục gốc. Tier nào THIẾU key sẽ tự động bị bỏ qua.
      #     Khi tier hiện tại hết hạn mức (429) -> tự chuyển tier kế tiếp.
      #     Ollama local (qwen2.5:1.5b) là lưới an toàn cuối — nhớ: ollama pull qwen2.5:1.5b
      LLM_CHAIN: >-
        [{"provider":"openai_compat","base_url":"https://api.groq.com/openai/v1","model":"llama-3.1-8b-instant","api_key":"${GROQ_API_KEY:-}"},
         {"provider":"openai_compat","base_url":"https://openrouter.ai/api/v1","model":"qwen/qwen-2.5-7b-instruct:free","api_key":"${OPENROUTER_API_KEY:-}"},
         {"provider":"openai_compat","base_url":"https://generativelanguage.googleapis.com/v1beta/openai","model":"gemini-2.5-flash-lite","api_key":"${GEMINI_API_KEY:-}"},
         {"provider":"ollama","base_url":"http://ollama:11434","model":"qwen2.5:1.5b"}]
      # (Khi LLM_CHAIN rỗng, hệ thống dùng provider đơn LLM_PROVIDER/LLM_MODEL bên dưới.)
      LLM_PROVIDER: openai_compat
      LLM_API_KEY: ${GROQ_API_KEY:-}
      LLM_BASE_URL: https://api.groq.com/openai/v1
      LLM_MODEL: llama-3.1-8b-instant
      CHROMA_PERSIST_DIR: /app/chroma_db
      METADATA_DIR: /metadata
      CORS_ORIGINS: http://localhost,http://localhost:5173
      # --- Đăng nhập (1 tài khoản cố định) ---
      AUTH_USERNAME: admin
      AUTH_PASSWORD: admin123
      JWT_SECRET: ${JWT_SECRET:-doi-thanh-chuoi-bi-mat-ngau-nhien-dai}
      ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/chroma_db
      - hf_cache:/root/.cache/huggingface   # cache embedding model giữa các lần chạy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: datamart-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data:
  ollama_data:
  chroma_data:
  hf_cache:
