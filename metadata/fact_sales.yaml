table: fact_sales
type: fact
description: >
  Bảng sự kiện bán hàng chi tiết. Mỗi dòng là một lượt bán một sản phẩm cho một
  khách hàng tại một chi nhánh vào một ngày. Đây là bảng trung tâm để phân tích
  doanh thu, sản lượng, chiết khấu.
grain: Mỗi dòng là một giao dịch bán hàng (sale_id).
columns:
  - name: sale_id
    type: INT
    description: Khóa chính của giao dịch bán.
  - name: product_id
    type: INT
    description: Khóa ngoại tới dim_product (sản phẩm được bán).
    foreign_key: dim_product.product_id
  - name: customer_id
    type: INT
    description: Khóa ngoại tới dim_customer (khách mua).
    foreign_key: dim_customer.customer_id
  - name: branch_id
    type: INT
    description: Khóa ngoại tới dim_branch (chi nhánh bán).
    foreign_key: dim_branch.branch_id
  - name: time_id
    type: INT
    description: Khóa ngoại tới dim_time (ngày bán).
    foreign_key: dim_time.time_id
  - name: quantity
    type: INT
    description: Số lượng sản phẩm bán trong giao dịch.
    measure: true
  - name: unit_price
    type: DECIMAL
    description: Đơn giá bán tại thời điểm giao dịch (VND).
    measure: true
  - name: discount
    type: DECIMAL
    description: Số tiền chiết khấu của giao dịch (VND).
    measure: true
  - name: total_amount
    type: DECIMAL
    description: Thành tiền sau chiết khấu (VND) = quantity*unit_price - discount. Dùng tính DOANH THU.
    measure: true
sample_questions:
  - Tổng doanh thu năm 2024?
  - Doanh thu theo danh mục sản phẩm?
  - Top 10 khách hàng chi tiêu nhiều nhất?
  - Doanh thu theo chi nhánh và theo tháng?
