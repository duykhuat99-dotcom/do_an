# Quy tắc nghiệp vụ & ràng buộc khi sinh SQL trên Star Schema đặt tour.
business_rules:
  - id: BR01
    name: Định nghĩa doanh thu
    description: >
      "Doanh thu" luôn tính bằng SUM(FactBooking.Revenue) (đơn vị VNĐ).
    tables: [FactBooking]

  - id: BR02
    name: Join qua DimDate để lọc/gom theo thời gian
    description: >
      Mọi điều kiện theo năm/quý/tháng phải JOIN FactBooking với DimDate qua DateKey,
      rồi lọc/gom trên DimDate.YearNumber / QuarterNumber / MonthNumber.
    tables: [DimDate, FactBooking]

  - id: BR03
    name: Join chiều để lấy thuộc tính mô tả
    description: >
      Khi phân tích theo điểm đến/vùng miền JOIN DimDestination qua DestinationKey;
      theo nhóm khách JOIN DimCustomerSegment qua SegmentKey; theo loại tour JOIN DimTour
      qua TourKey. Tên bảng/cột giữ đúng chữ hoa-thường (PascalCase).
    tables: [FactBooking, DimDestination, DimCustomerSegment, DimTour]

  - id: BR04
    name: Lượng khách và số booking
    description: >
      "Lượng khách" = SUM(FactBooking.Pax). "Số booking" = COUNT(*) hoặc SUM(BookingCount).
      Mỗi dòng FactBooking là một lượt đặt (BookingCount = 1).
    tables: [FactBooking]

  - id: BR05
    name: Điểm hài lòng
    description: >
      "Điểm hài lòng" = AVG(FactBooking.SatisfactionScore), thang 1-5. Có thể NULL nếu
      khách không đánh giá; AVG tự bỏ qua giá trị NULL.
    tables: [FactBooking]

  - id: BR06
    name: Đơn vị tiền tệ & giới hạn an toàn
    description: >
      Mọi giá trị tiền (Revenue) tính bằng VNĐ. Truy vấn liệt kê chi tiết nên có LIMIT
      hợp lý (vd 100); truy vấn tổng hợp (GROUP BY) không bắt buộc LIMIT.
    tables: [FactBooking]

  - id: BR07
    name: Chỉ được phép đọc dữ liệu (read-only)
    description: >
      LLM CHỈ được sinh câu lệnh SELECT (hoặc WITH ... SELECT). TUYỆT ĐỐI KHÔNG sinh
      INSERT/UPDATE/DELETE/DROP/TRUNCATE/ALTER/CREATE hay bất kỳ lệnh ghi nào.
    tables: []
