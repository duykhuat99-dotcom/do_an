table: dim_time
type: dimension
description: >
  Bảng chiều thời gian (date dimension). Mỗi dòng là một ngày lịch, đã tách sẵn
  ngày/tháng/quý/năm để phục vụ phân tích theo kỳ và so sánh kỳ trước.
grain: Mỗi dòng là một ngày duy nhất (full_date).
columns:
  - name: time_id
    type: INT
    description: Khóa chính của chiều thời gian. Được tham chiếu bởi mọi bảng fact.
  - name: full_date
    type: DATE
    description: Ngày đầy đủ (YYYY-MM-DD).
  - name: day
    type: INT
    description: Ngày trong tháng (1-31).
  - name: month
    type: INT
    description: Tháng (1-12). Dùng để gom nhóm theo tháng.
  - name: quarter
    type: INT
    description: Quý (1-4). Dùng để gom nhóm theo quý.
  - name: year
    type: INT
    description: Năm. Dùng để gom nhóm và so sánh theo năm.
  - name: weekday
    type: INT
    description: Thứ trong tuần (0=Thứ Hai ... 6=Chủ Nhật).
  - name: is_weekend
    type: INT
    description: Cờ cuối tuần (1=Thứ Bảy/Chủ Nhật, 0=ngày thường).
sample_questions:
  - Doanh thu theo từng tháng trong năm 2024?
  - So sánh doanh số quý 1 và quý 2?
  - Doanh số cuối tuần so với ngày thường?
