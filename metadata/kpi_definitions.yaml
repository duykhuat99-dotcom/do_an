# Định nghĩa KPI nghiệp vụ cho DataMart đặt tour. Giúp LLM ánh xạ thuật ngữ người dùng
# (doanh thu, lượng khách, điểm hài lòng...) sang công thức SQL trên Star Schema.
kpis:
  - name: Doanh thu
    aliases: [revenue, doanh số, sales]
    definition: Tổng doanh thu từ các lượt đặt tour.
    formula: SUM(FactBooking.Revenue)
    tables: [FactBooking]

  - name: Lượng khách
    aliases: [pax, số khách, số lượng khách, tổng khách]
    definition: Tổng số lượt khách của các booking.
    formula: SUM(FactBooking.Pax)
    tables: [FactBooking]

  - name: Số booking
    aliases: [số lượt đặt, số đơn, booking count, lượng booking]
    definition: Tổng số lượt đặt tour.
    formula: COUNT(*)   # hoặc SUM(FactBooking.BookingCount)
    tables: [FactBooking]

  - name: Điểm hài lòng trung bình
    aliases: [satisfaction, mức độ hài lòng, average satisfaction]
    definition: Điểm hài lòng trung bình của khách (thang 1-5).
    formula: AVG(FactBooking.SatisfactionScore)
    tables: [FactBooking]

  - name: Doanh thu trung bình mỗi booking
    aliases: [AOV, average booking value, doanh thu/booking]
    definition: Doanh thu trung bình trên một lượt đặt tour.
    formula: AVG(FactBooking.Revenue)
    tables: [FactBooking]

  - name: Tăng trưởng kỳ
    aliases: [growth, tăng trưởng, so sánh kỳ trước]
    definition: Phần trăm thay đổi của một chỉ số giữa kỳ hiện tại và kỳ trước.
    formula: (giá_trị_kỳ_này - giá_trị_kỳ_trước) / giá_trị_kỳ_trước * 100
    tables: [FactBooking, DimDate]
