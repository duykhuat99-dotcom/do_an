table: dim_branch
type: dimension
description: >
  Bảng chiều chi nhánh/cửa hàng. Mỗi dòng mô tả một chi nhánh cùng vùng miền
  và thành phố, dùng để phân tích hiệu quả kinh doanh theo địa lý.
grain: Mỗi dòng là một chi nhánh duy nhất (branch_id).
columns:
  - name: branch_id
    type: INT
    description: Khóa chính của chi nhánh. Được tham chiếu bởi fact_sales, fact_orders, fact_inventory.
  - name: branch_code
    type: VARCHAR
    description: Mã chi nhánh dạng BRxxx, duy nhất.
  - name: branch_name
    type: VARCHAR
    description: Tên chi nhánh.
  - name: region
    type: VARCHAR
    description: Vùng miền (Miền Bắc, Miền Trung, Miền Nam).
  - name: city
    type: VARCHAR
    description: Thành phố đặt chi nhánh.
  - name: manager
    type: VARCHAR
    description: Tên người quản lý chi nhánh.
sample_questions:
  - Doanh thu theo từng chi nhánh?
  - Vùng miền nào có doanh số cao nhất?
  - So sánh hiệu quả các chi nhánh ở Miền Nam.
