table: qlnv_chitiet
type: fact
description: >
  Bảng chi tiết theo dõi NHIỆM VỤ được giao theo văn bản (vd nhiệm vụ Chính phủ/VPCP).
  Mỗi dòng là một nhiệm vụ, gồm nội dung, đơn vị chủ trì/phối hợp, người giao/thực hiện,
  thời hạn, ngày hoàn thành, tiến độ và tình trạng. Đây là bảng phẳng (denormalized),
  tự chứa đầy đủ thông tin, KHÔNG cần JOIN sang bảng khác.
grain: Mỗi dòng là một nhiệm vụ duy nhất (idnv).
columns:
  - name: idnv
    type: BIGINT
    description: Khóa chính - mã định danh nhiệm vụ.
  - name: idnv_cha
    type: BIGINT
    description: Mã nhiệm vụ cha (quan hệ cha-con); rỗng nếu là nhiệm vụ gốc.
  - name: TenNhiemVu
    type: TEXT
    description: Tên/nội dung chi tiết của nhiệm vụ.
  - name: TenNhiemVuCha
    type: TEXT
    description: Tên nhiệm vụ cha (nếu thuộc một nhiệm vụ lớn hơn).
  - name: SanPhamChuYeu
    type: TEXT
    description: Sản phẩm/kết quả đầu ra chủ yếu cần đạt của nhiệm vụ.
  - name: KetQuaGhiChu
    type: TEXT
    description: Kết quả thực hiện hoặc ghi chú (vd "Chưa đánh giá").

  # ----- Phân loại nguồn & văn bản giao -----
  - name: NguonNV
    type: VARCHAR
    description: Nguồn của nhiệm vụ (vd "Nhiệm vụ VPCP" - Văn phòng Chính phủ).
  - name: NhomVB
    type: VARCHAR
    description: Nhóm văn bản giao nhiệm vụ.
  - name: LoaiVB
    type: VARCHAR
    description: Loại văn bản giao nhiệm vụ.
  - name: VanBanGiaoNhiemVu
    type: VARCHAR
    description: Số/ký hiệu văn bản giao nhiệm vụ (vd "158/CĐ-TTg").
  - name: DoKhan
    type: VARCHAR
    description: Độ khẩn của nhiệm vụ.
  - name: LinhVuc
    type: VARCHAR
    description: Lĩnh vực của nhiệm vụ.

  # ----- Đơn vị & người liên quan -----
  - name: DonViGiao
    type: VARCHAR
    description: Đơn vị giao nhiệm vụ.
  - name: DonViChuTri
    type: VARCHAR
    description: Đơn vị chủ trì thực hiện nhiệm vụ (vd "Bộ Tư pháp").
  - name: DonViPhoiHop
    type: TEXT
    description: Các đơn vị phối hợp thực hiện.
  - name: DonViThucHien
    type: TEXT
    description: Các đơn vị trực tiếp thực hiện.
  - name: SoDonViThucHien
    type: INT
    description: Số đơn vị tham gia thực hiện.
    measure: true
  - name: DonViHoanThanh
    type: INT
    description: Số đơn vị đã hoàn thành phần việc.
    measure: true
  - name: NguoiGiao
    type: VARCHAR
    description: Người giao nhiệm vụ.
  - name: NguoiThucHien
    type: VARCHAR
    description: Người trực tiếp thực hiện nhiệm vụ.

  # ----- Thời gian & tiến độ -----
  - name: ThoiHanHoanThanh
    type: DATETIME
    description: Thời hạn (deadline) phải hoàn thành nhiệm vụ.
  - name: NgayHoanThanh
    type: DATETIME
    description: Ngày hoàn thành thực tế (rỗng nếu chưa hoàn thành).
  - name: TienDoHoanThanh
    type: INT
    description: Tiến độ hoàn thành tính theo phần trăm (0-100).
    measure: true
  - name: SoNgayQuaHan
    type: INT
    description: Số ngày quá hạn so với thời hạn; > 0 nghĩa là nhiệm vụ bị trễ hạn.
    measure: true
  - name: TinhTrang
    type: VARCHAR
    description: Tình trạng nhiệm vụ (vd "Đã hoàn thành", "Đang thực hiện").
  - name: TrangThai
    type: VARCHAR
    description: Trạng thái chi tiết (vd "HT đúng hạn", "HT quá hạn", "Chưa hoàn thành").

  # ----- Khóa thời gian phục vụ lọc/gom nhóm -----
  - name: datekey
    type: INT
    description: Khóa ngày dạng số YYYYMMDD (vd 20251211). Dùng lọc/sắp xếp theo ngày.
  - name: weekkey
    type: INT
    description: Khóa tuần trong năm (vd 49).
  - name: monthkey
    type: INT
    description: Khóa tháng dạng số YYYYMM (vd 202512). Dùng gom nhóm theo tháng.
  - name: date_thu
    type: VARCHAR
    description: Thứ trong tuần dạng chữ (vd "Thứ 5").
  - name: month
    type: VARCHAR
    description: Tháng dạng chữ MM/YYYY (vd "12/2025").
  - name: syncdate
    type: TIMESTAMP
    description: Thời điểm bản ghi được đồng bộ vào hệ thống.

sample_questions:
  - Có bao nhiêu nhiệm vụ theo từng đơn vị chủ trì?
  - Tỷ lệ nhiệm vụ hoàn thành đúng hạn là bao nhiêu?
  - Liệt kê các nhiệm vụ đang quá hạn (SoNgayQuaHan > 0)?
  - Số nhiệm vụ theo từng tháng (monthkey)?
  - Thống kê nhiệm vụ theo tình trạng (TinhTrang)?
  - Đơn vị nào có nhiều nhiệm vụ quá hạn nhất?
