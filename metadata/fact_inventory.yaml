table: fact_inventory
type: fact
description: >
  Bảng snapshot tồn kho theo sản phẩm, chi nhánh và thời điểm (cuối tháng).
  Dùng phân tích mức tồn, giá trị tồn kho và cảnh báo dưới ngưỡng đặt hàng lại.
grain: Mỗi dòng là tồn kho của một sản phẩm tại một chi nhánh ở một thời điểm snapshot.
columns:
  - name: inventory_id
    type: INT
    description: Khóa chính của bản ghi tồn kho.
  - name: product_id
    type: INT
    description: Khóa ngoại tới dim_product.
    foreign_key: dim_product.product_id
  - name: branch_id
    type: INT
    description: Khóa ngoại tới dim_branch.
    foreign_key: dim_branch.branch_id
  - name: time_id
    type: INT
    description: Khóa ngoại tới dim_time (thời điểm chốt tồn kho).
    foreign_key: dim_time.time_id
  - name: stock_quantity
    type: INT
    description: Số lượng tồn kho tại thời điểm snapshot.
    measure: true
  - name: reorder_level
    type: INT
    description: Ngưỡng đặt hàng lại. Nếu stock_quantity < reorder_level thì cần nhập thêm.
  - name: stock_value
    type: DECIMAL
    description: Giá trị tồn kho (VND) = stock_quantity * unit_cost.
    measure: true
sample_questions:
  - Sản phẩm nào đang tồn kho dưới ngưỡng đặt hàng lại?
  - Tổng giá trị tồn kho theo chi nhánh?
  - Top sản phẩm tồn kho nhiều nhất?
